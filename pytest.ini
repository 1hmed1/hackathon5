[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

# Markers
markers =
    integration: mark test as integration test (requires running services)
    slow: mark test as slow running
    requires_db: mark test as requiring database connection
    requires_kafka: mark test as requiring Kafka connection
    requires_openai: mark test as requiring OpenAI API key

# Output
addopts = 
    -v
    --tb=short
    --strict-markers
    --color=yes

# Coverage
addopts = 
    -v
    --tb=short
    --strict-markers
    --color=yes
    --cov=backend
    --cov=agent
    --cov=workers
    --cov-report=term-missing
    --cov-report=html:htmlcov

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Timeout for async tests
timeout = 30
