# Kafka PersistentVolumeClaims
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kafka-pvc-zookeeper-0
  namespace: customer-success-fte
  labels:
    app: zookeeper
    app.kubernetes.io/name: novasaas
    app.kubernetes.io/component: messaging
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

