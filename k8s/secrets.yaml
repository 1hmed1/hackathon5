apiVersion: v1
kind: Secret
metadata:
  name: novasaas-secrets
  namespace: customer-success-fte
  labels:
    app.kubernetes.io/name: novasaas
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # OpenAI Configuration
  OPENAI_API_KEY: "sk-your-openai-api-key-here"
  
  # Anthropic Configuration (optional)
  ANTHROPIC_API_KEY: "sk-ant-your-anthropic-key-here"
  
  # PostgreSQL Credentials
  POSTGRES_PASSWORD: "your-secure-postgres-password-here"
  POSTGRES_CONNECTION_STRING: "postgresql://novasaas:your-secure-postgres-password-here@postgres-service:5432/novasaas"
  
  # Gmail / Google Cloud Credentials
  # Base64 encoded service account JSON
  GMAIL_CREDENTIALS: |
    {
      "type": "service_account",
      "project_id": "your-gcp-project-id",
      "private_key_id": "your-private-key-id",
      "private_key": "-----BEGIN PRIVATE KEY-----\nYOUR-PRIVATE-KEY-HERE\n-----END PRIVATE KEY-----\n",
      "client_email": "novasaas@your-gcp-project-id.iam.gserviceaccount.com",
      "client_id": "your-client-id",
      "auth_uri": "https://accounts.google.com/o/oauth2/auth",
      "token_uri": "https://oauth2.googleapis.com/token"
    }
  GMAIL_DELEGATED_USER: "support@yourdomain.com"
  GCP_PROJECT_ID: "your-gcp-project-id"
  
  # Twilio Configuration
  TWILIO_ACCOUNT_SID: "AC-your-twilio-account-sid-here"
  TWILIO_AUTH_TOKEN: "your-twilio-auth-token-here"
  TWILIO_WHATSAPP_NUMBER: "whatsapp:+14155238886"
  TWILIO_WEBHOOK_URL: "https://support-api.novasaas.com/webhooks/whatsapp"
  
  # Redis Password (if enabled)
  REDIS_PASSWORD: "your-redis-password-here"
  
  # JWT Secret for Authentication
  JWT_SECRET_KEY: "your-super-secret-jwt-key-minimum-32-chars"
  
  # Encryption Key for Sensitive Data
  ENCRYPTION_KEY: "your-32-character-encryption-key-here"
  
  # API Secret Key
  SECRET_KEY: "your-django-style-secret-key-here"

---
# Gmail Credentials as a separate secret (for mounting as file)
apiVersion: v1
kind: Secret
metadata:
  name: gmail-service-account
  namespace: customer-success-fte
  labels:
    app.kubernetes.io/name: novasaas
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  service-account.json: |
    {
      "type": "service_account",
      "project_id": "your-gcp-project-id",
      "private_key_id": "your-private-key-id",
      "private_key": "-----BEGIN PRIVATE KEY-----\nYOUR-PRIVATE-KEY-HERE\n-----END PRIVATE KEY-----\n",
      "client_email": "novasaas@your-gcp-project-id.iam.gserviceaccount.com",
      "client_id": "your-client-id",
      "auth_uri": "https://accounts.google.com/o/oauth2/auth",
      "token_uri": "https://oauth2.googleapis.com/token",
      "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
      "client_x509_cert_url": "https://www.googleapis.com/robot/v1/metadata/x509/novasaas%40your-gcp-project-id.iam.gserviceaccount.com"
    }

---
# Database Credentials Secret (for external database or managed services)
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: customer-success-fte
  labels:
    app.kubernetes.io/name: novasaas
    app.kubernetes.io/component: database
type: kubernetes.io/basic-auth
stringData:
  username: "novasaas"
  password: "your-secure-postgres-password-here"

---
# Kafka Credentials (if using managed Kafka with authentication)
apiVersion: v1
kind: Secret
metadata:
  name: kafka-credentials
  namespace: customer-success-fte
  labels:
    app.kubernetes.io/name: novasaas
    app.kubernetes.io/component: messaging
type: Opaque
stringData:
  # SASL credentials if using managed Kafka
  KAFKA_SASL_USERNAME: "your-kafka-username"
  KAFKA_SASL_PASSWORD: "your-kafka-password"
  # Or SSL certificates
  KAFKA_CA_CERT: |
    -----BEGIN CERTIFICATE-----
    YOUR-CA-CERTIFICATE-HERE
    -----END CERTIFICATE-----
  KAFKA_CLIENT_CERT: |
    -----BEGIN CERTIFICATE-----
    YOUR-CLIENT-CERTIFICATE-HERE
    -----END CERTIFICATE-----
  KAFKA_CLIENT_KEY: |
    -----BEGIN PRIVATE KEY-----
    YOUR-CLIENT-KEY-HERE
    -----END PRIVATE KEY-----
