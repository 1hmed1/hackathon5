apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  namespace: customer-success-fte
  labels:
    app.kubernetes.io/name: novasaas
    app.kubernetes.io/component: agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
    spec:
      serviceAccountName: novasaas-service-account
      terminationGracePeriodSeconds: 30
      containers:
      - name: agent
        image: novasaas/agent:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8001
          protocol: TCP
        env:
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: novasaas-config
              key: ENVIRONMENT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: novasaas-config
              key: LOG_LEVEL
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: novasaas-secrets
              key: POSTGRES_CONNECTION_STRING
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: novasaas-config
              key: KAFKA_BOOTSTRAP_SERVERS
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: novasaas-secrets
              key: OPENAI_API_KEY
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: novasaas-secrets
              key: ANTHROPIC_API_KEY
        - name: AGENT_MODEL
          valueFrom:
            configMapKeyRef:
              name: novasaas-config
              key: AGENT_MODEL
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: gmail-credentials
          mountPath: /app/credentials
          readOnly: true
        - name: tmp-volume
          mountPath: /tmp
      volumes:
      - name: gmail-credentials
        secret:
          secretName: gmail-service-account
          defaultMode: 0640
      - name: tmp-volume
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - agent
              topologyKey: kubernetes.io/hostname

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: agent-pdb
  namespace: customer-success-fte
  labels:
    app.kubernetes.io/name: novasaas
    app.kubernetes.io/component: agent
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: agent
