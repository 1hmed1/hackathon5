apiVersion: v1
kind: ServiceAccount
metadata:
  name: novasaas-service-account
  namespace: customer-success-fte
  labels:
    app.kubernetes.io/name: novasaas
    app.kubernetes.io/component: rbac
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: novasaas-role
  namespace: customer-success-fte
  labels:
    app.kubernetes.io/name: novasaas
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets", "pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "replicasets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: novasaas-role-binding
  namespace: customer-success-fte
  labels:
    app.kubernetes.io/name: novasaas
subjects:
- kind: ServiceAccount
  name: novasaas-service-account
  namespace: customer-success-fte
roleRef:
  kind: Role
  name: novasaas-role
  apiGroup: rbac.authorization.k8s.io
